name: Daily Literature Push

on:
  schedule:
    # 北京时间 08:05 (UTC 00:05)，避开整点高峰
    - cron: '5 0 * * 2'
  workflow_dispatch: # 允许手动触发

jobs:
  push-literature:
    runs-on: ubuntu-latest
    
    steps:
      # ✅ 升级点 1: checkout 从 v3 升级到 v4
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ 升级点 2: setup-python 从 v4 升级到 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # 也可以使用 '3.11' 以获得更好性能

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Literature Script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python push_lit.py
