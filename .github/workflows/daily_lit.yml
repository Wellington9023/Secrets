name: Daily Literature Push

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (即北京时间早上 08:00)
    # 如果你想改为其他时间，可以修改 cron 表达式
    - cron: '5 0 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

jobs:
  push-lit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Literature Script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python push_lit.py
